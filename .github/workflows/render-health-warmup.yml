name: Render Health Warmup

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-health-warmup
  cancel-in-progress: false

env:
  RENDER_URL: https://finance-ai-assistant-web.onrender.com
  STATUS_BRANCH: render-health-status
  RENDER_HEALTH_DURATION_MS: "180000"
  RENDER_HEALTH_INTERVAL_MS: "15000"
  RENDER_HEALTH_TIMEOUT_MS: "30000"
  RENDER_HEALTH_OUTPUT_DIR: .render-health-status

jobs:
  warmup:
    name: Warm Render and publish health status
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Warm fixed Render URL
        continue-on-error: true
        run: node scripts/render-health-status-check.mjs

      - name: Publish status branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$STATUS_BRANCH" || true

          publish_dir="$(mktemp -d)"
          if git show-ref --verify --quiet "refs/remotes/origin/$STATUS_BRANCH"; then
            git worktree add --detach "$publish_dir" "origin/$STATUS_BRANCH"
            cd "$publish_dir"
            git switch -c "$STATUS_BRANCH" --track "origin/$STATUS_BRANCH"
          else
            git worktree add --detach "$publish_dir"
            cd "$publish_dir"
            git switch --orphan "$STATUS_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp "$RENDER_HEALTH_OUTPUT_DIR/render-health.json" ./render-health.json
          cp "$RENDER_HEALTH_OUTPUT_DIR/index.html" ./index.html
          git add render-health.json index.html
          if git diff --cached --quiet; then
            echo "No health status changes to publish."
            exit 0
          fi
          git commit -m "Update Render health status [skip ci]"
          git push origin "HEAD:$STATUS_BRANCH"
