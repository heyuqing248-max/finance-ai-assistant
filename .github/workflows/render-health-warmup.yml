name: Render Health Warmup

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: render-health-warmup
  cancel-in-progress: false

env:
  RENDER_URL: https://finance-ai-assistant-web.onrender.com
  STATUS_BRANCH: render-health-status

jobs:
  warmup:
    name: Warm Render and publish health status
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Warm fixed Render URL
        shell: bash
        run: |
          set -u
          status_dir="$(mktemp -d)"
          started_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          probe() {
            local name="$1"
            local path="$2"
            local body_file
            body_file="$(mktemp)"
            local result http_code duration ok
            result="$(curl -L -sS -o "$body_file" -w "%{http_code} %{time_total}" --connect-timeout 10 --max-time 30 "$RENDER_URL$path" || true)"
            http_code="$(printf "%s" "$result" | awk '{print $1}')"
            duration="$(printf "%s" "$result" | awk '{print $2}')"
            if [ -z "$http_code" ]; then
              http_code="0"
            fi
            if [ -z "$duration" ]; then
              duration="0"
            fi
            if [ "$http_code" = "200" ]; then
              ok="true"
            else
              ok="false"
            fi
            printf '{"name":"%s","path":"%s","ok":%s,"status":%s,"durationSeconds":%s}' "$name" "$path" "$ok" "$http_code" "$duration"
          }

          home_result="$(probe home /)"
          health_result="$(probe health /health)"
          api_health_result="$(probe apiHealth /api/health)"
          ended_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          if printf "%s\n%s\n%s" "$home_result" "$health_result" "$api_health_result" | grep -q '"ok":false'; then
            overall_ok="false"
          else
            overall_ok="true"
          fi

          cat > "$status_dir/render-health.json" <<JSON
          {
            "service": "finance-ai-assistant-web",
            "url": "$RENDER_URL",
            "ok": $overall_ok,
            "startedAt": "$started_at",
            "endedAt": "$ended_at",
            "checks": [
              $home_result,
              $health_result,
              $api_health_result
            ],
            "note": "Generated by GitHub Actions to keep the free Render service warm and expose the latest public health check. No secrets are written."
          }
          JSON

          cat > "$status_dir/index.html" <<HTML
          <!doctype html>
          <html lang="zh-CN">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Finance AI Render Health</title>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 40px; color: #17211d; background: #f6faf7; }
                main { max-width: 760px; margin: 0 auto; }
                code, pre { background: #e8f3ed; border-radius: 6px; padding: 2px 6px; }
                .ok { color: #067647; font-weight: 700; }
                .bad { color: #b42318; font-weight: 700; }
              </style>
            </head>
            <body>
              <main>
                <h1>Finance AI Render Health</h1>
                <p>Status: <span class="$([ "$overall_ok" = "true" ] && echo ok || echo bad)">$overall_ok</span></p>
                <p>Checked at: <code>$ended_at</code></p>
                <p>Target: <a href="$RENDER_URL">$RENDER_URL</a></p>
                <p>JSON: <a href="./render-health.json">render-health.json</a></p>
                <p>中文：这个页面由 GitHub Actions 免费定时任务生成，用来预热 Render 并记录最近一次健康检查。</p>
                <p>English: This page is generated by a free GitHub Actions schedule to warm Render and record the latest health check.</p>
              </main>
            </body>
          </html>
          HTML

          echo "status_dir=$status_dir" >> "$GITHUB_ENV"

      - name: Publish status branch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin "$STATUS_BRANCH" || true

          publish_dir="$(mktemp -d)"
          if git show-ref --verify --quiet "refs/remotes/origin/$STATUS_BRANCH"; then
            git worktree add --detach "$publish_dir" "origin/$STATUS_BRANCH"
            cd "$publish_dir"
            git switch -c "$STATUS_BRANCH" --track "origin/$STATUS_BRANCH"
          else
            git worktree add --detach "$publish_dir"
            cd "$publish_dir"
            git switch --orphan "$STATUS_BRANCH"
            git rm -rf . >/dev/null 2>&1 || true
          fi

          cp "$status_dir/render-health.json" ./render-health.json
          cp "$status_dir/index.html" ./index.html
          git add render-health.json index.html
          if git diff --cached --quiet; then
            echo "No health status changes to publish."
            exit 0
          fi
          git commit -m "Update Render health status [skip ci]"
          git push origin "HEAD:$STATUS_BRANCH"
