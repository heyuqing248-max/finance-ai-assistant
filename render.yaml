services:
  - type: web
    name: finance-ai-assistant-web
    runtime: node
    plan: free
    buildCommand: node --version
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: FINANCE_AI_PUBLIC_HOST
        value: 0.0.0.0
      - key: FINANCE_AI_STABLE_PUBLIC_URL
        value: https://finance-ai-assistant-web.onrender.com
      - key: FINANCE_AI_MARKET_DATA_PROVIDER
        value: multi-free
      - key: FINANCE_AI_MARKET_DATA_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_MARKET_DATA_MODE
        value: delayed
      - key: FINANCE_AI_NEWS_PROVIDER
        value: multi-free-news
      - key: FINANCE_AI_NEWS_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_YAHOO_NEWS_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_GOOGLE_NEWS_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_GDELT_NEWS_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_FILINGS_PROVIDER
        value: multi-free-filings
      - key: FINANCE_AI_FILINGS_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_MACRO_PROVIDER
        value: world-bank-open-data
      - key: FINANCE_AI_MACRO_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_TWELVE_DATA_API_KEY
        sync: false
      - key: FINANCE_AI_ALPHA_VANTAGE_API_KEY
        sync: false
      - key: FINANCE_AI_NEWS_API_KEY
        sync: false
      - key: FINANCE_AI_MODEL_API_KEY
        sync: false
      - key: FINANCE_AI_MODEL_PROVIDER
        value: openai-compatible
      - key: FINANCE_AI_MODEL_ID
        value: gpt-5.5
      - key: FINANCE_AI_MODEL_BASE_URL
        value: https://api.openai.com/v1
      - key: FINANCE_AI_MODEL_API_STYLE
        value: responses
      - key: FINANCE_AI_MODEL_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_MODEL_RUNTIME
        value: render-smoke
      - key: FINANCE_AI_MODEL_MAX_CALLS_PER_MINUTE
        value: "3"
      - key: FINANCE_AI_MODEL_MAX_TOKENS_PER_REQUEST
        value: "1400"
      - key: FINANCE_AI_MODEL_FALLBACK_API_KEY
        sync: false
      - key: FINANCE_AI_MODEL_FALLBACK_ID
        value: gemini-2.5-flash
      - key: FINANCE_AI_MODEL_FALLBACK_BASE_URL
        value: https://generativelanguage.googleapis.com/v1beta/openai
      - key: FINANCE_AI_MODEL_FALLBACK_API_STYLE
        value: chat-completions
      - key: FINANCE_AI_MODEL_FALLBACK_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_MODEL_FALLBACK2_API_KEY
        sync: false
      - key: FINANCE_AI_MODEL_FALLBACK2_ID
        value: qwen/qwen3-next-80b-a3b-instruct:free
      - key: FINANCE_AI_MODEL_FALLBACK2_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: FINANCE_AI_MODEL_FALLBACK2_API_STYLE
        value: chat-completions
      - key: FINANCE_AI_MODEL_FALLBACK2_ALLOW_NETWORK
        value: "true"
      - key: FINANCE_AI_MODEL_FALLBACK3_API_KEY
        sync: false
      - key: FINANCE_AI_MODEL_FALLBACK3_ID
        value: llama-3.1-8b-instant
      - key: FINANCE_AI_MODEL_FALLBACK3_ALT_IDS
        value: openai/gpt-oss-120b
      - key: FINANCE_AI_MODEL_FALLBACK3_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: FINANCE_AI_MODEL_FALLBACK3_API_STYLE
        value: chat-completions
      - key: FINANCE_AI_MODEL_FALLBACK3_ALLOW_NETWORK
        value: "true"
